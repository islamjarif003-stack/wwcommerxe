# ═══════════════════════════════════════════════════════════════
# WW Commerce — Docker Production Setup
# ═══════════════════════════════════════════════════════════════
# Usage:
#   docker-compose up -d           → Start everything
#   docker-compose logs -f app     → Watch app logs
#   docker-compose exec app sh     → Shell into app
#   docker-compose down            → Stop
# ═══════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL Database ───────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: wwcommerce-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wwadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-StrongPass123!}
      POSTGRES_DB: ${POSTGRES_DB:-wwcommerce}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432" # Remove in prod if not exposing DB directly
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wwadmin} -d ${POSTGRES_DB:-wwcommerce}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js App ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: wwcommerce-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wwadmin}:${POSTGRES_PASSWORD:-StrongPass123!}@db:5432/${POSTGRES_DB:-wwcommerce}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_SETUP_KEY: ${ADMIN_SETUP_KEY}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-WW Commerce}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - ./public/uploads:/app/public/uploads # Persist uploaded images
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx Reverse Proxy (optional but recommended) ────────
  nginx:
    image: nginx:alpine
    container_name: wwcommerce-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro # your SSL certs
      - nginx_logs:/var/log/nginx

volumes:
  postgres_data:
  nginx_logs:
